<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demos — Mostlysane AI</title>
<link rel="stylesheet" href="../style.css">
<style>
body {
  max-width: 100%; margin: 0; padding: 0; padding-top: 56px;
  background: var(--bg); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: rgba(13,17,23,0.92); backdrop-filter: blur(8px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 1.5rem; height: 56px;
}
nav .logo { font-size: 1.1rem; font-weight: 700; color: var(--text); text-decoration: none; }
nav .logo span { color: var(--accent); }
nav .links { display: flex; gap: 0.5rem; }
nav .links a {
  color: var(--text-muted); text-decoration: none; font-size: 0.85rem;
  padding: 0.4rem 0.7rem; border-radius: 6px; transition: 0.15s;
}
nav .links a:hover { color: var(--text); background: var(--card); }
nav .links a.active { color: var(--accent); }
.comparison-frame { width: 100%; height: 100vh; border: none; display: block; }
</style>
</head>
<body>
<nav>
  <a href="/" class="logo">Mostlysane <span>AI</span></a>
  <div class="links">
    <a href="/">Home</a>
    <a href="/getstarted.html">Get Started</a>
    <a href="/demos/" class="active">Demos</a>
    <a href="/research.html">Research</a>
    <a href="/about.html">About</a>
  </div>
</nav>
<iframe class="comparison-frame" src="comparison.html" title="Model comparison demos"></iframe>
</body>
</html>
