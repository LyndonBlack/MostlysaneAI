# Build Mostlysane prebuilt binaries for all platforms
#
# Triggers:
#   - Manual dispatch from GitHub Actions tab (recommended)
#   - Push to main that changes this workflow file
#
# Produces multi-platform binaries with full CUDA/entropy/turboquant support.
# Binary URL pattern (for installer download):
#   https://github.com/LyndonBlack/llama.cpp-Ternary-1.58Bit-and-TurboQuant/releases/latest/download/llama-server-{platform}-{backend}.tar.gz
#
# 1. Go to: https://github.com/LyndonBlack/MostlysaneAI/actions/workflows/build-binaries.yml
# 2. Click "Run workflow"
# 3. Optionally set a version tag (e.g. v1.0.0) to attach binaries to a release

name: Build Mostlysane binaries

env:
  # Opt into Node.js 24 for GitHub Actions (default from June 2, 2026)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version tag (e.g. v1.0.0). Leave blank for artifact-only build.'
        required: false
        type: string
  push:
    paths:
      - '.github/workflows/build-binaries.yml'
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-cuda
            cmake_flags: -DGGML_CUDA=ON
            artifact_name: llama-server-linux-cuda
            compress: tar

          - os: ubuntu-latest
            label: linux-cpu
            cmake_flags: ""
            artifact_name: llama-server-linux-cpu
            compress: tar

          - os: macos-latest
            label: macos-metal
            cmake_flags: -DGGML_METAL=ON
            artifact_name: llama-server-macos-metal
            compress: tar

          - os: windows-latest
            label: windows-cuda
            cmake_flags: -DGGML_CUDA=ON
            artifact_name: llama-server-windows-cuda
            compress: zip

          - os: windows-latest
            label: windows-cpu
            cmake_flags: ""
            artifact_name: llama-server-windows-cpu
            compress: zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout turboternary branch (llama.cpp fork)
        uses: actions/checkout@v4
        with:
          repository: LyndonBlack/llama.cpp-Ternary-1.58Bit-and-TurboQuant
          ref: turboternary

      # ── Install build tools ──

      - name: Install CUDA (Linux)
        if: matrix.label == 'linux-cuda'
        run: |
          sudo apt update -qq
          sudo apt install -y -qq nvidia-cuda-toolkit
          echo "CUDA installed: $(nvcc --version | tail -1)"

      - name: Install CUDA (Windows)
        if: matrix.label == 'windows-cuda'
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: '12.6.0'
          # local method = full installer (includes headers + runtime)
          # sub-packages is Linux-only, doesn't work on Windows

      # ── Remove allreduce.cu (multi-GPU — not needed, causes CUDA 12.3+ half ambiguity) ──
      - name: Remove allreduce.cu (multi-GPU, not used)
        if: matrix.label == 'linux-cuda' || matrix.label == 'windows-cuda'
        run: rm -f ggml/src/ggml-cuda/allreduce.cu

      # ── Build ──

      - name: Configure CMake
        run: |
          mkdir -p build
          cd build
          cmake .. ${{ matrix.cmake_flags }}

      - name: Build
        run: |
          cd build
          # Build only llama-server; macOS needs sysctl (no nproc)
          if [ "$RUNNER_OS" = "Windows" ]; then
            cmake --build . --config Release --target llama-server
          elif [ "$RUNNER_OS" = "macOS" ]; then
            NPROC=$(sysctl -n hw.logicalcpu 2>/dev/null || echo 4)
            cmake --build . --config Release -j$NPROC --target llama-server
          else
            cmake --build . --config Release -j$(nproc) --target llama-server
          fi
        shell: bash

      # ── Package ──

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          cd build/bin
          echo "Packaging binaries found:" && ls -la 2>/dev/null
          tar czf ../../${{ matrix.artifact_name }}.tar.gz \
            llama-server 2>/dev/null || \
          (echo "⚠️  No binaries found in build/bin/"; exit 1)

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          cd build/bin
          echo "Packaging binaries found:" && ls -la 2>/dev/null
          tar czf ../../${{ matrix.artifact_name }}.tar.gz \
            llama-server 2>/dev/null || \
          (echo "⚠️  No binaries found in build/bin/"; exit 1)

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $src = "${{ github.workspace }}\build\bin\Release\"
          $dst = "${{ github.workspace }}\${{ matrix.artifact_name }}.zip"
          Write-Host "Binaries in $src:"
          Get-ChildItem $src 2>$null | Select-Object Name | Format-Table -AutoSize
          Compress-Archive -Path (Join-Path $src "llama-server.exe") -DestinationPath $dst -Force

      # ── Upload to Actions artifacts (always) ──

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.${{ (matrix.compress == 'tar' && 'tar.gz') || 'zip' }}

      # ── Upload to GitHub Release (only when version input is set) ──

      - name: Create Release
        if: inputs.version != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: "Mostlysane ${{ inputs.version }}"
          body: "Prebuilt llama-server binaries for all platforms."
          files: |
            ${{ matrix.artifact_name }}.${{ (matrix.compress == 'tar' && 'tar.gz') || 'zip' }}
          fail_on_unmatched_files: false
